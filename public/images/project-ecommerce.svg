<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgEcom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#1a0f28"/>
    </linearGradient>
    <filter id="glowEcom">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bgEcom)"/>
  <rect x="1" y="1" width="598" height="398" rx="16" fill="none" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
  <g filter="url(#glowEcom)">
    <!-- Shopping cart -->
    <g transform="translate(230,70)">
      <path d="M20,50 L35,10 L130,10 L145,50" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
      <rect x="25" y="50" width="115" height="65" rx="6" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
      <circle cx="55" cy="130" r="10" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
      <circle cx="110" cy="130" r="10" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
      <!-- Items in cart -->
      <rect x="40" y="60" width="30" height="20" rx="3" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.6"/>
      <rect x="80" y="60" width="30" height="20" rx="3" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.6"/>
      <rect x="55" y="88" width="55" height="18" rx="3" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
      <text x="82" y="101" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22d3ee" opacity="0.7">CHECKOUT</text>
    </g>
    <!-- Payment flow -->
    <g opacity="0.5">
      <line x1="300" y1="220" x2="300" y2="245" stroke="#a78bfa" stroke-width="1"/>
      <polygon points="295,243 300,253 305,243" fill="#a78bfa"/>
    </g>
    <!-- Payment badge -->
    <rect x="250" y="255" width="100" height="30" rx="15" fill="none" stroke="#5eead4" stroke-width="1"/>
    <text x="300" y="274" text-anchor="middle" font-family="system-ui" font-size="10" fill="#5eead4" opacity="0.8">💳 SECURE</text>
  </g>
  <text x="300" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#a78bfa" font-weight="600" letter-spacing="2">E-COMMERCE</text>
  <text x="300" y="350" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="3">.NET CORE · STRIPE · ANGULAR</text>
</svg>
