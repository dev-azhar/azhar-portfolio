<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgFB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#1a1025"/>
    </linearGradient>
    <filter id="glowFB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bgFB)"/>
  <rect x="1" y="1" width="598" height="398" rx="16" fill="none" stroke="rgba(94,234,212,0.12)" stroke-width="1"/>
  <g filter="url(#glowFB)">
    <!-- Football / Soccer Ball -->
    <circle cx="300" cy="155" r="65" fill="none" stroke="#5eead4" stroke-width="2"/>
    <circle cx="300" cy="155" r="65" fill="rgba(94,234,212,0.03)"/>
    <!-- Pentagon pattern (hexagonal panels) -->
    <polygon points="300,115 320,125 315,148 285,148 280,125" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.5"/>
    <polygon points="300,195 320,185 315,162 285,162 280,185" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.5"/>
    <polygon points="249,135 258,155 245,170 235,155 240,135" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
    <polygon points="351,135 342,155 355,170 365,155 360,135" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
    <!-- Goal post -->
    <line x1="170" y1="250" x2="170" y2="210" stroke="#5eead4" stroke-width="1.5" opacity="0.3"/>
    <line x1="430" y1="250" x2="430" y2="210" stroke="#5eead4" stroke-width="1.5" opacity="0.3"/>
    <line x1="170" y1="210" x2="430" y2="210" stroke="#5eead4" stroke-width="1.5" opacity="0.3"/>
    <!-- Net lines -->
    <line x1="200" y1="210" x2="200" y2="250" stroke="#5eead4" stroke-width="0.5" opacity="0.15"/>
    <line x1="240" y1="210" x2="240" y2="250" stroke="#5eead4" stroke-width="0.5" opacity="0.15"/>
    <line x1="280" y1="210" x2="280" y2="250" stroke="#5eead4" stroke-width="0.5" opacity="0.15"/>
    <line x1="320" y1="210" x2="320" y2="250" stroke="#5eead4" stroke-width="0.5" opacity="0.15"/>
    <line x1="360" y1="210" x2="360" y2="250" stroke="#5eead4" stroke-width="0.5" opacity="0.15"/>
    <line x1="400" y1="210" x2="400" y2="250" stroke="#5eead4" stroke-width="0.5" opacity="0.15"/>
    <line x1="170" y1="225" x2="430" y2="225" stroke="#5eead4" stroke-width="0.5" opacity="0.15"/>
    <line x1="170" y1="240" x2="430" y2="240" stroke="#5eead4" stroke-width="0.5" opacity="0.15"/>
    <!-- Ground line -->
    <line x1="100" y1="250" x2="500" y2="250" stroke="#5eead4" stroke-width="1" opacity="0.2"/>
  </g>
  <text x="300" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#5eead4" font-weight="600" letter-spacing="3">FOOTBALL</text>
  <text x="300" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" letter-spacing="3">PASSION · TEAMWORK</text>
</svg>
