<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgCR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#1a1025"/>
    </linearGradient>
    <filter id="glowCR">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bgCR)"/>
  <rect x="1" y="1" width="598" height="398" rx="16" fill="none" stroke="rgba(94,234,212,0.12)" stroke-width="1"/>
  <g filter="url(#glowCR)">
    <!-- Cricket bat -->
    <rect x="210" y="95" width="22" height="100" rx="4" fill="none" stroke="#5eead4" stroke-width="1.8"/>
    <rect x="210" y="95" width="22" height="100" rx="4" fill="rgba(94,234,212,0.05)"/>
    <rect x="215" y="195" width="12" height="50" rx="2" fill="none" stroke="#5eead4" stroke-width="1.2" opacity="0.7"/>
    <!-- Ball -->
    <circle cx="370" cy="150" r="28" fill="none" stroke="#a78bfa" stroke-width="1.8"/>
    <circle cx="370" cy="150" r="28" fill="rgba(167,139,250,0.05)"/>
    <!-- Seam -->
    <path d="M355,125 Q370,150 355,175" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
    <path d="M385,125 Q370,150 385,175" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
    <!-- Stumps -->
    <line x1="290" y1="110" x2="290" y2="240" stroke="#5eead4" stroke-width="1.2" opacity="0.4"/>
    <line x1="300" y1="110" x2="300" y2="240" stroke="#5eead4" stroke-width="1.2" opacity="0.4"/>
    <line x1="310" y1="110" x2="310" y2="240" stroke="#5eead4" stroke-width="1.2" opacity="0.4"/>
    <!-- Bails -->
    <line x1="290" y1="110" x2="300" y2="107" stroke="#5eead4" stroke-width="1" opacity="0.4"/>
    <line x1="300" y1="107" x2="310" y2="110" stroke="#5eead4" stroke-width="1" opacity="0.4"/>
  </g>
  <text x="300" y="305" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#5eead4" font-weight="600" letter-spacing="3">CRICKET</text>
  <text x="300" y="335" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" letter-spacing="3">STRATEGY · PRECISION</text>
</svg>
