<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgVB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#1a1025"/>
    </linearGradient>
    <filter id="glowVB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bgVB)"/>
  <rect x="1" y="1" width="598" height="398" rx="16" fill="none" stroke="rgba(94,234,212,0.12)" stroke-width="1"/>
  <g filter="url(#glowVB)">
    <!-- Volleyball -->
    <circle cx="300" cy="160" r="65" fill="none" stroke="#5eead4" stroke-width="2"/>
    <circle cx="300" cy="160" r="65" fill="rgba(94,234,212,0.03)"/>
    <!-- Panel lines -->
    <path d="M235,160 Q270,120 300,95" fill="none" stroke="#5eead4" stroke-width="1.2" opacity="0.6"/>
    <path d="M365,160 Q330,120 300,95" fill="none" stroke="#5eead4" stroke-width="1.2" opacity="0.6"/>
    <path d="M235,160 Q270,200 300,225" fill="none" stroke="#5eead4" stroke-width="1.2" opacity="0.6"/>
    <path d="M365,160 Q330,200 300,225" fill="none" stroke="#5eead4" stroke-width="1.2" opacity="0.6"/>
    <line x1="265" y1="105" x2="265" y2="215" stroke="#5eead4" stroke-width="1" opacity="0.3"/>
    <line x1="335" y1="105" x2="335" y2="215" stroke="#5eead4" stroke-width="1" opacity="0.3"/>
    <!-- Net -->
    <line x1="120" y1="240" x2="480" y2="240" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.4"/>
    <line x1="120" y1="240" x2="120" y2="260" stroke="#a78bfa" stroke-width="1.5" opacity="0.3"/>
    <line x1="480" y1="240" x2="480" y2="260" stroke="#a78bfa" stroke-width="1.5" opacity="0.3"/>
  </g>
  <text x="300" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#5eead4" font-weight="600" letter-spacing="3">VOLLEYBALL</text>
  <text x="300" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" letter-spacing="3">TEAM SPIRIT · AGILITY</text>
</svg>
