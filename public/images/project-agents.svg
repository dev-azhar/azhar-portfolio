<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#1a1025"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg5)"/>
  <rect x="1" y="1" width="598" height="398" rx="16" fill="none" stroke="rgba(167,139,250,0.12)" stroke-width="1"/>
  <!-- Agent nodes in a hub-spoke layout -->
  <g filter="url(#glow5)">
    <!-- Central orchestrator -->
    <circle cx="300" cy="170" r="35" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="300" cy="170" r="12" fill="#a78bfa" opacity="0.3"/>
    <text x="300" y="175" text-anchor="middle" font-family="system-ui" font-size="11" fill="#a78bfa" font-weight="600">ORCH</text>
    <!-- Agent 1 - top left -->
    <circle cx="170" cy="100" r="25" fill="none" stroke="#5eead4" stroke-width="1.5"/>
    <text x="170" y="104" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5eead4">SEARCH</text>
    <line x1="195" y1="112" x2="268" y2="155" stroke="rgba(94,234,212,0.3)" stroke-width="1"/>
    <!-- Agent 2 - top right -->
    <circle cx="430" cy="100" r="25" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="430" y="104" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22d3ee">CODER</text>
    <line x1="405" y1="112" x2="332" y2="155" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
    <!-- Agent 3 - bottom left -->
    <circle cx="170" cy="240" r="25" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="170" y="244" text-anchor="middle" font-family="system-ui" font-size="9" fill="#f59e0b">REVIEW</text>
    <line x1="195" y1="228" x2="268" y2="185" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <!-- Agent 4 - bottom right -->
    <circle cx="430" cy="240" r="25" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <text x="430" y="244" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ef4444">DEPLOY</text>
    <line x1="405" y1="228" x2="332" y2="185" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
    <!-- Animated dots on connections -->
    <circle cx="230" cy="133" r="3" fill="#5eead4" opacity="0.8"/>
    <circle cx="368" cy="133" r="3" fill="#22d3ee" opacity="0.8"/>
    <circle cx="230" cy="207" r="3" fill="#f59e0b" opacity="0.8"/>
    <circle cx="368" cy="207" r="3" fill="#ef4444" opacity="0.8"/>
  </g>
  <text x="300" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#a78bfa" font-weight="600" letter-spacing="2">AGENTIC SYSTEM</text>
  <text x="300" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="3">CREWAI · AUTOGEN · MULTI-AGENT</text>
</svg>
