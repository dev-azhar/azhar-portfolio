<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#0a2328"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#5eead4"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg3)"/>
  <rect x="1" y="1" width="598" height="398" rx="16" fill="none" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <!-- RAG Pipeline flow -->
  <g filter="url(#glow3)">
    <!-- Document -->
    <rect x="80" y="140" width="70" height="90" rx="6" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="95" y1="160" x2="135" y2="160" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
    <line x1="95" y1="172" x2="130" y2="172" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
    <line x1="95" y1="184" x2="125" y2="184" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
    <line x1="95" y1="196" x2="132" y2="196" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
    <text x="115" y="220" text-anchor="middle" font-family="system-ui" font-size="9" fill="#22d3ee" opacity="0.6">DOCS</text>
    <!-- Arrow 1 -->
    <line x1="155" y1="185" x2="205" y2="185" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
    <polygon points="205,180 215,185 205,190" fill="#22d3ee" opacity="0.5"/>
    <!-- Vector DB -->
    <g transform="translate(220,145)">
      <ellipse cx="40" cy="10" rx="40" ry="10" fill="none" stroke="#5eead4" stroke-width="1.5"/>
      <line x1="0" y1="10" x2="0" y2="70" stroke="#5eead4" stroke-width="1.5"/>
      <line x1="80" y1="10" x2="80" y2="70" stroke="#5eead4" stroke-width="1.5"/>
      <ellipse cx="40" cy="70" rx="40" ry="10" fill="none" stroke="#5eead4" stroke-width="1.5"/>
      <ellipse cx="40" cy="40" rx="40" ry="10" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.3"/>
      <text x="40" y="44" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5eead4" opacity="0.7">VECTORS</text>
    </g>
    <!-- Arrow 2 -->
    <line x1="305" y1="185" x2="350" y2="185" stroke="#5eead4" stroke-width="1" opacity="0.4"/>
    <polygon points="350,180 360,185 350,190" fill="#5eead4" opacity="0.5"/>
    <!-- LLM Brain -->
    <g transform="translate(365,145)">
      <circle cx="45" cy="40" r="40" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
      <path d="M25,35 Q35,15 45,35 Q55,15 65,35" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
      <path d="M25,45 Q35,65 45,45 Q55,65 65,45" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
      <circle cx="45" cy="40" r="5" fill="#a78bfa" opacity="0.5"/>
      <text x="45" y="88" text-anchor="middle" font-family="system-ui" font-size="9" fill="#a78bfa" opacity="0.7">LLM</text>
    </g>
    <!-- Arrow 3 -->
    <line x1="455" y1="185" x2="475" y2="185" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
    <polygon points="475,180 485,185 475,190" fill="#a78bfa" opacity="0.5"/>
    <!-- Output -->
    <rect x="490" y="160" width="60" height="50" rx="8" fill="none" stroke="#5eead4" stroke-width="1.5"/>
    <text x="520" y="182" text-anchor="middle" font-family="system-ui" font-size="10" fill="#5eead4" opacity="0.8">✨</text>
    <text x="520" y="198" text-anchor="middle" font-family="system-ui" font-size="8" fill="#5eead4" opacity="0.5">OUTPUT</text>
  </g>
  <text x="300" y="300" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#22d3ee" font-weight="600" letter-spacing="2">RAG PIPELINE</text>
  <text x="300" y="330" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="3">LANGCHAIN · VECTOR DB · LLM</text>
</svg>
