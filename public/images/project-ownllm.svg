<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgLlm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accentLlm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#5eead4"/>
    </linearGradient>
    <filter id="glowLlm">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bgLlm)"/>
  <rect x="1" y="1" width="598" height="398" rx="16" fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <!-- Grid -->
  <g opacity="0.04" stroke="#a78bfa" stroke-width="0.5">
    <line x1="0" y1="80" x2="600" y2="80"/><line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/><line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="120" y1="0" x2="120" y2="400"/><line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/>
  </g>
  <!-- Central brain/transformer block -->
  <g filter="url(#glowLlm)" transform="translate(200,50)">
    <!-- Transformer layers stacked -->
    <rect x="40" y="20" width="120" height="24" rx="6" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
    <text x="100" y="37" text-anchor="middle" font-family="system-ui" font-size="9" fill="#a78bfa" opacity="0.8">ATTENTION</text>
    <rect x="40" y="54" width="120" height="24" rx="6" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.8"/>
    <text x="100" y="71" text-anchor="middle" font-family="system-ui" font-size="9" fill="#7c3aed" opacity="0.8">FEED-FORWARD</text>
    <rect x="40" y="88" width="120" height="24" rx="6" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
    <text x="100" y="105" text-anchor="middle" font-family="system-ui" font-size="9" fill="#a78bfa" opacity="0.7">ATTENTION</text>
    <rect x="40" y="122" width="120" height="24" rx="6" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
    <text x="100" y="139" text-anchor="middle" font-family="system-ui" font-size="9" fill="#7c3aed" opacity="0.6">FEED-FORWARD</text>
    <!-- Nx indicator -->
    <text x="172" y="86" font-family="system-ui" font-size="16" fill="#5eead4" font-weight="600" opacity="0.7">×N</text>
    <!-- Bracket -->
    <path d="M168,18 L180,18 L180,148 L168,148" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.4"/>
    <!-- Input embeddings -->
    <g opacity="0.6">
      <line x1="100" y1="160" x2="100" y2="185" stroke="#5eead4" stroke-width="1"/>
      <polygon points="95,183 100,193 105,183" fill="#5eead4"/>
    </g>
    <rect x="50" y="195" width="100" height="22" rx="5" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
    <text x="100" y="210" text-anchor="middle" font-family="system-ui" font-size="8" fill="#5eead4" opacity="0.6">EMBEDDINGS</text>
    <!-- Output head -->
    <g opacity="0.6">
      <line x1="100" y1="18" x2="100" y2="-7" stroke="#a78bfa" stroke-width="1"/>
      <polygon points="95,-5 100,-15 105,-5" fill="#a78bfa"/>
    </g>
    <rect x="55" y="-36" width="90" height="22" rx="5" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
    <text x="100" y="-21" text-anchor="middle" font-family="system-ui" font-size="8" fill="#a78bfa" opacity="0.6">LM HEAD</text>
  </g>
  <!-- Data flow arrows on left -->
  <g filter="url(#softGlow)" opacity="0.5">
    <text x="120" y="120" font-family="system-ui" font-size="10" fill="#5eead4">TOKENS</text>
    <line x1="165" y1="117" x2="235" y2="117" stroke="#5eead4" stroke-width="0.8" stroke-dasharray="4,3"/>
    <polygon points="233,113 243,117 233,121" fill="#5eead4" opacity="0.6"/>
  </g>
  <g filter="url(#softGlow)" opacity="0.5">
    <text x="400" y="80" font-family="system-ui" font-size="10" fill="#a78bfa">OUTPUT</text>
    <line x1="365" y1="77" x2="395" y2="77" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="4,3"/>
  </g>
  <!-- WIP badge -->
  <g transform="translate(420,130)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="rgba(94,234,212,0.08)" stroke="rgba(94,234,212,0.2)" stroke-width="1"/>
    <circle cx="16" cy="14" r="4" fill="#5eead4" opacity="0.8"/>
    <text x="55" y="18" text-anchor="middle" font-family="system-ui" font-size="10" fill="#5eead4" font-weight="600" letter-spacing="1">BUILDING</text>
  </g>
  <!-- Loss curve hint -->
  <g transform="translate(410,180)" opacity="0.4">
    <text x="40" y="0" text-anchor="middle" font-family="system-ui" font-size="8" fill="#a78bfa" opacity="0.6">TRAINING LOSS</text>
    <path d="M0,50 Q15,48 25,35 Q40,15 55,12 Q65,10 80,9" fill="none" stroke="#5eead4" stroke-width="1.5"/>
    <line x1="0" y1="55" x2="80" y2="55" stroke="#a78bfa" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="5" x2="0" y2="55" stroke="#a78bfa" stroke-width="0.5" opacity="0.4"/>
  </g>
  <!-- Labels -->
  <text x="300" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="url(#accentLlm)" font-weight="700" letter-spacing="2">OWN LLM</text>
  <text x="300" y="338" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="3">TRANSFORMER · TRAINING · TOKENIZER</text>
  <text x="300" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(94,234,212,0.5)" letter-spacing="2">🔬 WORK IN PROGRESS</text>
  <!-- Background glow -->
  <circle cx="300" cy="180" r="120" fill="#7c3aed" opacity="0.025" filter="url(#glowLlm)"/>
</svg>
