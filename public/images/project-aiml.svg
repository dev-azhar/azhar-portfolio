<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg2)"/>
  <rect x="1" y="1" width="598" height="398" rx="16" fill="none" stroke="rgba(124,58,237,0.15)" stroke-width="1"/>
  <!-- Neural network nodes -->
  <g filter="url(#glow2)" opacity="0.9">
    <!-- Layer 1 -->
    <circle cx="180" cy="120" r="10" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="180" cy="180" r="10" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="180" cy="240" r="10" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <!-- Layer 2 -->
    <circle cx="300" cy="140" r="12" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="300" cy="200" r="12" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="300" cy="260" r="12" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <!-- Layer 3 -->
    <circle cx="420" cy="160" r="10" fill="none" stroke="#5eead4" stroke-width="2"/>
    <circle cx="420" cy="220" r="10" fill="none" stroke="#5eead4" stroke-width="2"/>
    <!-- Connections L1-L2 -->
    <g stroke="rgba(124,58,237,0.3)" stroke-width="1">
      <line x1="190" y1="120" x2="288" y2="140"/><line x1="190" y1="120" x2="288" y2="200"/>
      <line x1="190" y1="180" x2="288" y2="140"/><line x1="190" y1="180" x2="288" y2="200"/>
      <line x1="190" y1="180" x2="288" y2="260"/><line x1="190" y1="240" x2="288" y2="200"/>
      <line x1="190" y1="240" x2="288" y2="260"/><line x1="190" y1="120" x2="288" y2="260"/>
      <line x1="190" y1="240" x2="288" y2="140"/>
    </g>
    <!-- Connections L2-L3 -->
    <g stroke="rgba(94,234,212,0.3)" stroke-width="1">
      <line x1="312" y1="140" x2="410" y2="160"/><line x1="312" y1="140" x2="410" y2="220"/>
      <line x1="312" y1="200" x2="410" y2="160"/><line x1="312" y1="200" x2="410" y2="220"/>
      <line x1="312" y1="260" x2="410" y2="160"/><line x1="312" y1="260" x2="410" y2="220"/>
    </g>
    <!-- Node fills -->
    <circle cx="180" cy="120" r="4" fill="#7c3aed" opacity="0.7"/>
    <circle cx="180" cy="180" r="4" fill="#7c3aed" opacity="0.7"/>
    <circle cx="180" cy="240" r="4" fill="#7c3aed" opacity="0.7"/>
    <circle cx="300" cy="140" r="5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="300" cy="200" r="5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="300" cy="260" r="5" fill="#a78bfa" opacity="0.7"/>
    <circle cx="420" cy="160" r="4" fill="#5eead4" opacity="0.7"/>
    <circle cx="420" cy="220" r="4" fill="#5eead4" opacity="0.7"/>
  </g>
  <!-- Label -->
  <text x="300" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#a78bfa" font-weight="600" letter-spacing="2">AI / ML</text>
  <text x="300" y="350" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="3">PYTORCH · LLM · LANGCHAIN</text>
  <circle cx="300" cy="380" r="50" fill="#7c3aed" opacity="0.04" filter="url(#glow2)"/>
</svg>
