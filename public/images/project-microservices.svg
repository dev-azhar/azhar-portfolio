<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#0d1f1a"/>
    </linearGradient>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg6)"/>
  <rect x="1" y="1" width="598" height="398" rx="16" fill="none" stroke="rgba(94,234,212,0.12)" stroke-width="1"/>
  <!-- Microservices boxes -->
  <g filter="url(#glow6)">
    <!-- API Gateway -->
    <rect x="225" y="60" width="150" height="40" rx="8" fill="none" stroke="#5eead4" stroke-width="1.5"/>
    <text x="300" y="85" text-anchor="middle" font-family="system-ui" font-size="12" fill="#5eead4" font-weight="500">API GATEWAY</text>
    <!-- Service 1 -->
    <rect x="80" y="150" width="120" height="60" rx="8" fill="none" stroke="#22d3ee" stroke-width="1"/>
    <text x="140" y="176" text-anchor="middle" font-family="system-ui" font-size="10" fill="#22d3ee">Auth Service</text>
    <text x="140" y="194" text-anchor="middle" font-family="system-ui" font-size="8" fill="#22d3ee" opacity="0.5">.NET Core</text>
    <!-- Service 2 -->
    <rect x="240" y="150" width="120" height="60" rx="8" fill="none" stroke="#a78bfa" stroke-width="1"/>
    <text x="300" y="176" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a78bfa">AI Service</text>
    <text x="300" y="194" text-anchor="middle" font-family="system-ui" font-size="8" fill="#a78bfa" opacity="0.5">Python · FastAPI</text>
    <!-- Service 3 -->
    <rect x="400" y="150" width="120" height="60" rx="8" fill="none" stroke="#f59e0b" stroke-width="1"/>
    <text x="460" y="176" text-anchor="middle" font-family="system-ui" font-size="10" fill="#f59e0b">Data Service</text>
    <text x="460" y="194" text-anchor="middle" font-family="system-ui" font-size="8" fill="#f59e0b" opacity="0.5">SQL · Cosmos DB</text>
    <!-- Connection lines -->
    <line x1="260" y1="100" x2="140" y2="150" stroke="rgba(34,211,238,0.3)" stroke-width="1"/>
    <line x1="300" y1="100" x2="300" y2="150" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
    <line x1="340" y1="100" x2="460" y2="150" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <!-- Message bus -->
    <rect x="110" y="240" width="380" height="30" rx="15" fill="none" stroke="#5eead4" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="300" y="260" text-anchor="middle" font-family="system-ui" font-size="10" fill="#5eead4" opacity="0.5">EVENT BUS / MESSAGE QUEUE</text>
    <line x1="140" y1="210" x2="140" y2="240" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
    <line x1="300" y1="210" x2="300" y2="240" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <line x1="460" y1="210" x2="460" y2="240" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  </g>
  <text x="300" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#5eead4" font-weight="600" letter-spacing="2">MICROSERVICES</text>
  <text x="300" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="3">.NET CORE · PYTHON · AZURE</text>
</svg>
