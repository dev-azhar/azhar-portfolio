<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#0f1f3d"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5eead4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" rx="16" fill="url(#bg1)"/>
  <rect x="1" y="1" width="598" height="398" rx="16" fill="none" stroke="rgba(94,234,212,0.15)" stroke-width="1"/>
  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#5eead4" stroke-width="0.5">
    <line x1="0" y1="80" x2="600" y2="80"/><line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/><line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="120" y1="0" x2="120" y2="400"/><line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/><line x1="480" y1="0" x2="480" y2="400"/>
  </g>
  <!-- Icon: Building/Enterprise -->
  <g transform="translate(260,100)" filter="url(#glow1)">
    <rect x="0" y="30" width="80" height="100" rx="4" fill="none" stroke="url(#accent1)" stroke-width="2"/>
    <rect x="12" y="45" width="12" height="10" rx="1" fill="#5eead4" opacity="0.6"/>
    <rect x="34" y="45" width="12" height="10" rx="1" fill="#5eead4" opacity="0.6"/>
    <rect x="56" y="45" width="12" height="10" rx="1" fill="#5eead4" opacity="0.6"/>
    <rect x="12" y="65" width="12" height="10" rx="1" fill="#5eead4" opacity="0.4"/>
    <rect x="34" y="65" width="12" height="10" rx="1" fill="#5eead4" opacity="0.4"/>
    <rect x="56" y="65" width="12" height="10" rx="1" fill="#5eead4" opacity="0.4"/>
    <rect x="12" y="85" width="12" height="10" rx="1" fill="#5eead4" opacity="0.3"/>
    <rect x="34" y="85" width="12" height="10" rx="1" fill="#5eead4" opacity="0.3"/>
    <rect x="56" y="85" width="12" height="10" rx="1" fill="#5eead4" opacity="0.3"/>
    <rect x="30" y="110" width="20" height="20" rx="1" fill="#5eead4" opacity="0.5"/>
  </g>
  <!-- Label -->
  <text x="300" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#5eead4" font-weight="600" letter-spacing="2">ENTERPRISE</text>
  <text x="300" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" letter-spacing="3">.NET CORE · ANGULAR · AZURE</text>
  <!-- Glow orb -->
  <circle cx="300" cy="360" r="60" fill="#5eead4" opacity="0.03" filter="url(#glow1)"/>
</svg>
